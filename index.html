<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KulturSmåland</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Crimson+Pro:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/main.js" type="module"></script>
</head>

<body>
    <div class="topbar">
        <div class="topbar-name">KulturSmåland</div>
        <div class="topbar-sort">
            <label for="sort-select">Sortera efter:</label>
            <select id="sort-select">
                <option value="distance-asc">Närmast först</option>
                <option value="distance-desc">Längst bort först</option>
                <option value="rating-desc">Högst betyg</option>
                <option value="rating-asc">Lägst betyg</option>
            </select>
        </div>
        <div class="topbar-search">
            <input type="text" id="search-input" placeholder="Sök (t.ex Kalmar slott)...">
            <span class="search-icon">🔍</span>
        </div>
    </div>

    <div class="layout">
        <aside class="sidebar">
            
            <div class="filter-group">
                <button class="filter-toggle" data-group="kategori">Kategori <span class="arrow">›</span></button>
                <div class="filter-options" data-group="kategori" id="category-checkboxes">
                    <label class="checkbox-label"><input type="checkbox" value="museum" class="category-checkbox"> Museum</label>
                    <label class="checkbox-label"><input type="checkbox" value="slott" class="category-checkbox"> Slott</label>
                    <label class="checkbox-label"><input type="checkbox" value="kyrka" class="category-checkbox"> Kyrka</label>
                </div>
            </div>

            <div class="filter-group">
                <button class="filter-toggle" data-group="omrade">Kommun <span class="arrow">›</span></button>
                <div class="filter-options" data-group="omrade" id="municipality-checkboxes">
                    </div>
            </div>

            <div class="filter-group">
                <button class="filter-toggle" data-group="avstand">Avstånd <span class="arrow">›</span></button>
                <div class="filter-options" data-group="avstand">
                    <button class="filter-btn">&lt; 5 km</button>
                    <button class="filter-btn">&lt; 25 km</button>
                    <button class="filter-btn">&lt; 50 km</button>
                    <button class="filter-btn">Alla</button>
                </div>
            </div>

        </aside>

        <main class="content">
            <div id="active-chips" class="chip-container"></div>
            <section id="cards"></section>
        </main>
    </div>

    <footer>
        <p>&copy; 2026 KulturSmåland</p>
    </footer>
</body>

</html>

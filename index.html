<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KulturSmåland</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Crimson+Pro:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/main.js" type="module"></script>
</head>

<body>

    <header>
        <div class="topbar">
            <div class="topbar-name"><h1>KulturSmåland</h1></div>
            <div class="topbar-sort">
                <label for="sort-select">Sortera efter:</label>
                <select id="sort-select">
                    <option value="distance-asc">Närmast först</option>
                    <option value="distance-desc">Längst bort först</option>
                    <option value="rating-desc">Högst betyg</option>
                    <option value="rating-asc">Lägst betyg</option>
                </select>
            </div>
            <div class="topbar-search">
                <input type="text" id="search-input" placeholder="Sök (t.ex Kalmar slott)..." aria-label="Sök Kultur-Småland" title="Sök">

                <span class="search-icon"><img src="icons/search.svg" alt="Sök"></span>
            </div>
        </div>
    </header>
    <div class="mobile-menu-row">
        <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Öppna meny">☰</button>
    </div>

    <div class="layout">
        <aside class="sidebar">

            <div class="filter-group">
                <button class="filter-toggle" data-group="kategori">Kategori <span class="arrow">›</span></button>
                <div class="filter-options" data-group="kategori" id="category-checkboxes">
                    <label class="checkbox-label"><input type="checkbox" value="museum" class="category-checkbox"> Museum</label>
                    <label class="checkbox-label"><input type="checkbox" value="slott" class="category-checkbox"> Slott</label>
                    <label class="checkbox-label"><input type="checkbox" value="kyrka" class="category-checkbox"> Kyrka</label>
                </div>
            </div>

            <div class="filter-group">
                <button class="filter-toggle" data-group="omrade">Kommun <span class="arrow">›</span></button>
                <div class="filter-options" data-group="omrade" id="municipality-checkboxes">
                </div>
            </div>

            <div class="filter-group">
                <button class="filter-toggle" data-group="avstand">Avstånd <span class="arrow">›</span></button>
                <div class="filter-options" data-group="avstand">
                    <label class="checkbox-label">
                        <input type="radio" name="distance" class="distance-radio" value="5"> &lt; 5 km
                    </label>
                    <label class="checkbox-label">
                        <input type="radio" name="distance" class="distance-radio" value="25"> &lt; 25 km
                    </label>
                    <label class="checkbox-label">
                        <input type="radio" name="distance" class="distance-radio" value="50"> &lt; 50 km
                    </label>
                    <label class="checkbox-label">
                        <input type="radio" name="distance" class="distance-radio" value="all" checked> Alla
                    </label>
                </div>
            </div>

        </aside>

        <main class="content">
            <div id="active-chips" class="chip-container"></div>
            <section id="cards"></section>
        </main>
    </div>

    <footer>
        <p>&copy; 2026 KulturSmåland</p>
    </footer>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <script>
        const menuBtn = document.getElementById('mobile-menu-btn');
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.getElementById('sidebar-overlay');

        function toggleMenu() {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('open');
        }

        if (menuBtn) menuBtn.addEventListener('click', toggleMenu);
        if (overlay) overlay.addEventListener('click', toggleMenu);
    </script>
</body>

</html>
